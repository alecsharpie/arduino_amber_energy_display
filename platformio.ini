; ============================================================
; AmberOrb - PlatformIO Configuration
; ============================================================
; Key concepts:
;   [env:xxx]    = a build target (board + settings)
;   lib_deps     = libraries to auto-install (like pip/uv for Arduino)
;   build_flags  = compiler flags (like #defines)
;   monitor_speed = Serial Monitor baud rate
;
; Commands:
;   pio run                  - compile
;   pio run -t upload        - flash to board
;   pio device monitor       - serial monitor
;   pio test -e native       - run desktop unit tests
; ============================================================

[env:uno_r4_wifi]
platform = renesas-ra
board = uno_r4_wifi
framework = arduino
monitor_speed = 115200
upload_protocol = custom
upload_command = ./upload.sh $SOURCE
build_src_filter = -<test_*> +<main.cpp>
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0
build_flags =
    -I include
    -D USE_LAVA_LAMP
    ; Uncomment to enable other modules:
    ; -D USE_MATRIX_SUN
    ; -D USE_MATRIX_DIGITS
    ; -D USE_TRAFFIC_LEDS

; Integration test — uploads a color test sketch to the board
; Usage: pio run -e test_colors -t upload && pio device monitor
; build_src_filter swaps main.cpp for the test file
[env:test_colors]
extends = env:uno_r4_wifi
build_src_filter = -<main.cpp> +<test_lava_colors.cpp>

; Native environment for running unit tests on your laptop (no Arduino needed)
[env:native]
platform = native
test_framework = unity
build_flags = -std=c++11 -I lib/lava_lamp
lib_ignore = lava_lamp, amber_api, traffic_leds, matrix_sun, matrix_digits
